<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>DiDi Alianza · 骑手上线追踪 · 7/5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
 --bg:#0b1120; --panel:#131c31; --panel2:#0f1729; --border:#26324f;
 --tx:#e9eef8; --tx2:#9fb0cc; --tx3:#6b77a9;
 --accent:#ff5a1f; --gold:#f5b301; --blue:#3987e5; --good:#22c55e; --bad:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;line-height:1.5}
.wrap{max-width:1180px;margin:0 auto;padding:16px}
.top{display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:10px}.brand b{font-size:17px}.brand span{color:var(--tx2);font-size:12px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
.rowflex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.dateswitch{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.dateswitch button{background:transparent;border:0;color:var(--tx2);padding:8px 14px;cursor:pointer;font-size:13px;font-weight:500}
.dateswitch button.on{background:var(--accent);color:#111}
select,.btn{background:var(--panel);border:1px solid var(--border);color:var(--tx);border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer}
.btn:hover,select:hover{border-color:#3a4a72}
.uploads{display:none;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
body.master .uploads{display:flex}
.up{position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);color:var(--tx);border-radius:9px;padding:8px 12px;cursor:pointer;font-size:13px}
.up:hover{border-color:#3a4a72}.up input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.up .tag{font-size:10px;color:var(--tx3)}
.muted{color:var(--tx2);font-size:12px}.right{margin-left:auto;display:flex;gap:8px;align-items:center}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:var(--panel)}
.seg button{background:none;border:0;color:var(--tx2);font-size:11px;font-weight:600;letter-spacing:.05em;padding:7px 10px;cursor:pointer}
.seg button.on{background:var(--accent);color:#111}
.userchip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,90,31,.12);border:1px solid rgba(255,90,31,.3);color:#ff9d73;border-radius:9px;padding:5px 10px;font-size:12px;font-weight:600}
.banner{background:rgba(245,179,1,.1);border:1px solid rgba(245,179,1,.35);color:#ffd769;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:12px;display:none}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.kpi .l{font-size:12px;color:var(--tx2)}.kpi .v{font-size:24px;font-weight:600;margin-top:2px}
.kpi .g{font-size:12px;margin-top:4px;font-weight:600}
.gbad{color:var(--bad)}.ggood{color:var(--good)}
.tabs{display:flex;flex-wrap:wrap;gap:4px;border-bottom:1px solid var(--border);margin-bottom:14px}
.tabs button{background:transparent;border:0;border-bottom:2px solid transparent;color:var(--tx2);padding:10px 14px;cursor:pointer;font-size:14px;font-weight:500}
.tabs button.on{color:var(--tx);border-bottom-color:var(--accent)}
.note{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 12px;font-size:12px;color:var(--tx2);margin-bottom:12px}
.tablewrap{overflow:auto;border:1px solid var(--border);border-radius:12px;background:var(--panel2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;text-align:right;white-space:nowrap}
th.l,td.l{text-align:left}
thead th{position:sticky;top:0;background:var(--panel);color:var(--tx2);font-weight:500;border-bottom:1px solid var(--border)}
tbody tr:nth-child(even){background:rgba(255,255,255,.02)}
.gapred{color:var(--bad);font-weight:700}.gapok{color:var(--good);font-weight:600}.gapzero{color:var(--tx2)}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.pA{background:rgba(255,90,31,.16);color:#ff8a5c}.pB{background:rgba(57,135,229,.16);color:#79b0f0}
.pend{background:rgba(159,176,204,.16);color:#9fb0cc}
.rank{font-weight:700;color:var(--gold)}
.grouphd{display:flex;align-items:center;gap:10px;margin:16px 0 8px;font-size:15px;font-weight:600}
.rmrow{border:1px solid var(--border);border-radius:12px;background:var(--panel);margin-bottom:8px;overflow:hidden}
.rmhead{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer}
.rmhead:hover{background:rgba(57,135,229,.06)}
.rmname{font-weight:600;font-size:15px;flex:1}
.chev{color:var(--tx3);transition:transform .2s}.rmrow.open .chev{transform:rotate(90deg)}
.rmstat{font-variant-numeric:tabular-nums;color:var(--tx2);font-size:13px}
.rmstat b{color:var(--tx)}
.rmstat b.gapred,td b.gapred{color:var(--bad)}
.rmstat b.gapok,td b.gapok{color:var(--good)}
.rmstat b.gapzero{color:var(--tx2)}
.rmbody{border-top:1px solid var(--border)}
.warn{background:rgba(239,68,68,.08);color:#f8a4a4;font-size:12px;padding:8px 14px;border-bottom:1px solid var(--border)}
.warn.ok{background:rgba(34,197,94,.08);color:#8fe0ad}
.dlrow{padding:10px 14px;border-top:1px solid var(--border)}
.overlay{position:fixed;inset:0;background:rgba(5,9,18,.92);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:26px;width:min(92vw,360px)}
.card h2{margin:0 0 4px;font-size:18px}.card .sub{color:var(--tx2);font-size:12px;margin-bottom:16px}
.field{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--tx);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:10px}
.err{color:var(--bad);font-size:12px;min-height:16px;margin-bottom:6px}
.gobtn{width:100%;background:var(--accent);color:#111;border:0;border-radius:9px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
</style>
</head>

  <div id="view"></div>
</div>

const HDRS={apikey:CFG.SUPABASE_ANON_KEY,Authorization:"Bearer "+CFG.SUPABASE_ANON_KEY,"Content-Type":"application/json"};
async function sbLoad(){
  const r=await fetch(`${CFG.SUPABASE_URL}/rest/v1/${CFG.TABLE}?select=id,data`,{headers:HDRS});
  if(!r.ok)throw new Error('sb '+r.status);
  const rows=await r.json(); if(!Array.isArray(rows))throw new Error('bad');
  const st={online:{},detail:{},over:{}};
  rows.forEach(x=>{const[date,kind,extra]=String(x.id).split('|');
    if(kind==='snap'){(st.online[date]||(st.online[date]=[])).push(x.data);}
    else if(kind==='detail'){st.detail[date]=x.data;}
    else{st.over[date]=st.over[date]||{};st.over[date][kind]=x.data;}});
  Object.keys(st.online).forEach(d=>st.online[d].sort((a,b)=>String(b.label||'').localeCompare(String(a.label||''))||String(b.time).localeCompare(String(a.time))));
  return st;
}
async function sbPut(id,data){
  const r=await fetch(`${CFG.SUPABASE_URL}/rest/v1/${CFG.TABLE}?on_conflict=id`,{method:"POST",
    headers:{...HDRS,Prefer:"resolution=merge-duplicates,return=minimal"},body:JSON.stringify([{id,data}])});
  if(!r.ok)throw new Error('sb put '+r.status);
}
async function sbDeleteDate(date){
  await fetch(`${CFG.SUPABASE_URL}/rest/v1/${CFG.TABLE}?id=like.${encodeURIComponent(date+'|')}*`,{method:"DELETE",headers:HDRS});
}

async function saveKey(date,kind,data,extra){

function dset(date,key){return (store.over[date]&&store.over[date][key])||(APPDATA.dates[date]?APPDATA.dates[date][key]:[])||[];}
function schedByVcSlot(date){
  const det=store.detail[date];const m={};
  if(det&&det.length){const seen={};det.forEach(r=>{const k=r.vc+'|'+r.slot+'|'+r.rider_id;if(seen[k])return;seen[k]=1;m[r.vc+'|'+r.slot]=(m[r.vc+'|'+r.slot]||0)+1;});}
  else dset(date,'schedule').forEach(r=>{m[r.vc+'|'+r.slot]=(m[r.vc+'|'+r.slot]||0)+r.scheduled;});
  return m;
}
const BADRM=new Set(['nan','no','don´t operate',"don't operate",'dont operate','']);
function cleanRM(rm){const r=String(rm==null?'':rm).trim();if(BADRM.has(r.toLowerCase()))return '';
  if(r.toLowerCase()==='ramses gonzalez')return 'Ramses Gonzalez';return r;}
function plan(date){
  const byVc={},v2rm={},v2city={};
  const touch=vc=>byVc[vc]||(byVc[vc]={rm:'',city:'',sched:0,tS3:0,tMatch:0,tCur:0,promise:0});
  const _TS=curSlot();dset(date,'target').forEach(r=>{const vc=r.vc;touch(vc);const _rm=cleanRM(r.rm);if(_rm)v2rm[vc]=_rm;if(r.city)v2city[vc]=r.city;
    if(r.slot==='S3')byVc[vc].tS3+=r.target;if(r.slot===_TS)byVc[vc].tCur+=r.target;if(MATCH.includes(r.slot))byVc[vc].tMatch+=r.target;});
  const sc=schedByVcSlot(date);
  Object.keys(sc).forEach(k=>{const[vc,slot]=k.split('|');touch(vc);if(slot==='S3')byVc[vc].sched+=sc[k];});
  dset(date,'schedule').forEach(r=>{const _rm=cleanRM(r.rm);if(_rm&&!v2rm[r.vc])v2rm[r.vc]=_rm;if(r.city&&!v2city[r.vc])v2city[r.vc]=r.city;});
  dset(date,'promise').forEach(r=>{const vc=r.vc;touch(vc);byVc[vc].promise+=r.promise;const _rm=cleanRM(r.rm);if(_rm&&!v2rm[vc])v2rm[vc]=_rm;});
  Object.keys(byVc).forEach(vc=>{byVc[vc].rm=v2rm[vc]||'—';byVc[vc].city=v2city[vc]||'';});
  const vByRM={};Object.keys(byVc).forEach(vc=>{(vByRM[byVc[vc].rm]||(vByRM[byVc[vc].rm]=[])).push(vc);});
  return {byVc,vByRM};
}
function curSlot(){const s=curSnap(cur.date);let hm='';
  if(s&&/^\d{1,2}:\d{2}$/.test(s.label||''))hm=s.label;
  else{const d=new Date();hm=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
  const h=parseInt(hm,10);
  if(h>=19)return 'S4'; if(h>=16)return 'S3'; if(h>=13)return 'S2'; return 'S1';}
function snaps(date){return store.online[date]||[];}
function curSnapIdx(date){const s=snaps(date);if(!s.length)return -1;let i=cur.snap[date];return (i==null||i>=s.length)?0:i;}
function onlineByVc(date){const s=snaps(date),i=curSnapIdx(date);return (i>=0&&s[i])?(s[i].by||{}):{};}
function curSnap(date){const s=snaps(date),i=curSnapIdx(date);return i>=0?s[i]:null;}
const rmMeta=Object.fromEntries(APPDATA.rm_meta.map(m=>[m.rm,m]));
function rmSize(rm){const m=rmMeta[rm];return m?m.size:0;}
function rmTier(rm){return rmSize(rm)>=200?'A':'B';}

function gapHtml(g){ // g = online - metric; 落后为负 → 红

function rmOnlineFromBy(P,by){const o={};Object.keys(P.byVc).forEach(vc=>{const rm=P.byVc[vc].rm;o[rm]=(o[rm]||0)+(by[vc]||0);});return o;}
function rankRows(){const P=plan(cur.date),on=onlineByVc(cur.date);
  const s=snaps(cur.date),i=curSnapIdx(cur.date);
  const curRm=rmOnlineFromBy(P,on);
  const prevRm=(i>=0&&s[i+1])?rmOnlineFromBy(P,s[i+1].by||{}):null;
  const peakRm={};{const seen={};s.forEach(x=>{(x.pairs||[]).forEach(p=>{const rid=p[0],vc=p[1];if(seen[rid])return;seen[rid]=1;
    const b=P.byVc[vc];const rm=b?b.rm:'';if(!rm||rm==='—')return;peakRm[rm]=(peakRm[rm]||0)+1;});});}
  const agg={};APPDATA.rm_meta.forEach(m=>agg[m.rm]={rm:m.rm,size:m.size,online:0,tS3:0});
  Object.keys(P.byVc).forEach(vc=>{const b=P.byVc[vc],rm=b.rm;if(!rm||rm==='—')return;if(!agg[rm])agg[rm]={rm,size:rmSize(rm),online:0,tS3:0};
    agg[rm].online+=on[vc]||0;agg[rm].tS3+=b.tS3;});
  return Object.values(agg).map(a=>({...a,group:rmTier(a.rm),score:a.tS3?a.online/a.tS3:0,
    dPrev:prevRm?(curRm[a.rm]||0)-(prevRm[a.rm]||0):null,
    dPeak:(curRm[a.rm]||0)-(peakRm[a.rm]||0)}));}
function viewRank(){const rows=rankRows();
  const tbl=g=>{let rs=rows.filter(r=>r.group===g).sort((a,b)=>b.score-a.score);let rk=0;
    const body=rs.map(r=>{rk++;return `<tr>
      <td class="l rank">${rk}</td><td class="l">${r.rm}</td><td>${r.size}</td>
      <td>${r.online||'—'}</td><td>${r.tS3}</td><td>${r.tS3?Math.round(r.score*100)+'%':'—'}</td>
      <td>${r.dPrev==null?'—':(r.dPrev>0?'<b class="gapok">+'+r.dPrev+'</b>':(r.dPrev<0?'<b class="gapred">'+r.dPrev+'</b>':'<span class="gapzero">0</span>'))}</td>
      <td>${r.dPeak>0?'<b class="gapok">+'+r.dPeak+'</b>':(r.dPeak<0?'<b class="gapred">'+r.dPeak+'</b>':'<span class="gapzero">0</span>')}</td></tr>`;}).join('');
    const bonus=g==='A'?'1º +30% · 2º +20% · 3º +10%':'1º +20% · 2º +10% · 3º +5%';
    return `<div class="grouphd"><span class="pill p${g}">GRUPO ${g}</span> ${g==='A'?T().gA:T().gB} <span class="muted">· ${bonus}</span></div>
      <div class="tablewrap"><table><thead><tr>
        <th class="l">${T().h_rank}</th><th class="l">${T().h_rm}</th><th>${T().h_size}</th><th>${T().h_online}</th><th>${T().h_t3}</th><th>${T().h_score}</th><th>${T().h_dprev}</th><th>${T().h_dpeak}</th>
      </tr></thead><tbody>${body}</tbody></table></div>`;};
  return `<div class="note">${T().rank_note}</div>${tbl('A')}${tbl('B')}`;}

function GAPCFGf(kind){const t=T();
  return kind==='target'?{mkey:'tCur',mlab:curSlot()+' '+t.m_tgt,note:t.n_tgt}
       :{mkey:'promise',mlab:t.m_prom,note:t.n_prom};}
function viewGap(kind){const cfg=GAPCFGf(kind),P=plan(cur.date),on=onlineByVc(cur.date);
  const rmAgg={};Object.keys(P.vByRM).forEach(rm=>{if(rm==='—'||rm==='')return;let m=0,o=0;P.vByRM[rm].forEach(vc=>{m+=P.byVc[vc][cfg.mkey];o+=on[vc]||0;});rmAgg[rm]={rm,metric:m,online:o,gap:m-o};});
  const rms=Object.values(rmAgg).sort((a,b)=>b.gap-a.gap);
  const rowsHtml=rms.map(r=>{const ek=kind+'|'+r.rm,open=!!cur.exp[ek];
    const gtxt=r.gap>0?`<b class="gapred">-${r.gap}</b>`:(r.gap<0?`<b class="gapok">+${-r.gap}</b>`:`<b class="gapzero">0</b>`);
    let body='';
    if(open){
      const vs=P.vByRM[r.rm].map(vc=>({vc,city:P.byVc[vc].city,metric:P.byVc[vc][cfg.mkey],online:on[vc]||0,gap:P.byVc[vc][cfg.mkey]-(on[vc]||0)})).sort((a,b)=>b.gap-a.gap);
      const worst=vs.filter(v=>v.gap>0).slice(0,3).map(v=>v.vc);
      const warn=worst.length?`<div class="warn">${T().worst(worst.join(', '))}</div>`:`<div class="warn ok">${T().allok}</div>`;
      const canDl=USER&&(USER.r==='master'||USER.n===r.rm);
      const dl=(kind==='sched')?`<div class="dlrow">${canDl?`<button class="btn" data-dlrm="${encodeURIComponent(r.rm)}">${T().dl_rm}</button>`:`<span class="muted">${T().dl_lock}</span>`}</div>`:'';
      body=`<div class="rmbody">${warn}<div class="tablewrap" style="border:0;border-radius:0"><table><thead><tr>
        <th class="l">${T().c_vendor}</th><th class="l">${T().c_city}</th><th>${cfg.mlab}</th><th>${T().h_online}</th><th>${T().gap}</th></tr></thead><tbody>${
        vs.map(v=>{const c=v.gap>0?'gapred':(v.gap<0?'gapok':'gapzero');
          return `<tr><td class="l">${v.vc}</td><td class="l">${v.city}</td><td>${v.metric}</td><td>${v.online||'—'}</td><td class="${c}">${v.gap>0?'-'+v.gap:(v.gap<0?'+'+(-v.gap):0)}</td></tr>`;}).join('')
        }</tbody></table></div>${dl}</div>`;
    }
    return `<div class="rmrow ${open?'open':''}"><div class="rmhead" data-ek="${ek}">
      <span class="chev">▸</span><span class="rmname">${r.rm}</span>
      <span class="rmstat">${cfg.mlab} <b>${r.metric}</b> · ${T().h_online} <b>${r.online||0}</b></span>
      <span class="rmstat">${T().gap} ${gtxt}</span></div>${body}</div>`;}).join('');
  return `<div class="note">${cfg.note}</div>${rowsHtml}`;}

function renderView(){const v=document.getElementById('view');
  v.innerHTML=cur.tab==='rank'?viewRank():viewGap(cur.tab);
  v.querySelectorAll('.rmhead').forEach(h=>h.onclick=()=>{const ek=h.dataset.ek;cur.exp[ek]=!cur.exp[ek];renderView();});
  v.querySelectorAll('[data-dlrm]').forEach(b=>b.onclick=e=>{e.stopPropagation();downloadRM(decodeURIComponent(b.dataset.dlrm));});
  renderKpis();}
function renderAll(){renderDateSwitch();renderSnapSel();renderTabs();renderView();}

/* ===== 下载：RM 排班未上线明细 ===== */
function downloadRM(rm){
  const det=store.detail[cur.date];
  if(!det||!det.length){alert(T().a_nodetail);return;}
  const snap=curSnap(cur.date);
  if(!snap){alert(T().a_nosnap);return;}
  const onIds=new Set((snap.pairs||[]).map(p=>p[0]));
  const P=plan(cur.date);const myVcs=new Set(P.vByRM[rm]||[]);
  const rows=[],seen={};
  det.forEach(r=>{if(!myVcs.has(r.vc))return;const k=r.vc+'|'+r.slot+'|'+r.rider_id;if(seen[k])return;seen[k]=1;
    const o={};o[T().c_rm]=rm;o[T().c_vendor]=r.vc;o[T().c_slot]=r.slot;o[T().c_rider]=r.rider_id;o[T().c_status]=onIds.has(String(r.rider_id))?T().st_on:T().st_off;rows.push(o);});
  rows.sort((a,b)=>((a[T().c_status]===T().st_off)?-1:1)-((b[T().c_status]===T().st_off)?-1:1));
  if(!rows.length){alert(T().a_norows);return;}
  const ks=Object.keys(rows[0]);
  const csv='\ufeff'+[ks.join(',')].concat(rows.map(r=>ks.map(k=>String(r[k])).join(','))).join('\n');
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='RM_'+rm.replace(/\s+/g,'_')+'_'+(snap.label||'')+'.csv';a.click();}

/* ===== 上传（仅管理员可见按钮） ===== */
document.getElementById('uploads').addEventListener('change',e=>{const inp=e.target;if(inp.type!=='file'||!inp.files[0])return;
  const kind=inp.dataset.kind,file=inp.files[0],rd=new FileReader();
  rd.onload=async ev=>{try{
    const wb=XLSX.read(ev.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];
    let mc=0,mr=0;Object.keys(ws).forEach(k=>{if(k[0]==='!')return;const c=XLSX.utils.decode_cell(k);if(c.c>mc)mc=c.c;if(c.r>mr)mr=c.r;});
    ws['!ref']=XLSX.utils.encode_range({s:{c:0,r:0},e:{c:mc,r:mr}});
    const raw=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(kind==='online'){openTimeModal(raw);}
    else{await ingest(kind,raw);renderAll();}
  }catch(err){alert(T().a_parse+err.message);}inp.value='';};
  rd.readAsArrayBuffer(file);});

let pendingOnline=null;
function defTime(){const pre=document.getElementById('snapTime').value;if(pre)return pre;
  const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+(d.getMinutes()<30?'00':'30');}
function openTimeModal(raw){pendingOnline=raw;const t=T();
  document.getElementById('tmT').textContent=t.tm_t;document.getElementById('tmS').textContent=t.tm_s;
  document.getElementById('tmOk').textContent=t.tm_ok;document.getElementById('tmCancel').textContent=t.tm_cancel;
  const sel=document.getElementById('tmSel');sel.innerHTML=TIMES.map(x=>`<option>${x}</option>`).join('');sel.value=defTime();
  document.getElementById('timeModal').classList.remove('hidden');}
document.getElementById('tmCancel').onclick=()=>{pendingOnline=null;document.getElementById('timeModal').classList.add('hidden');};
document.getElementById('tmOk').onclick=async()=>{if(!pendingOnline)return;
  const label=document.getElementById('tmSel').value;
  document.getElementById('timeModal').classList.add('hidden');
  const raw=pendingOnline;pendingOnline=null;
  await ingestOnline(raw,label);renderAll();};

async function ingestOnline(raw,label){const date=cur.date;
  const detMap={};(store.detail[date]||[]).forEach(r=>{detMap[String(r.rider_id)]=r.vc;});
  const by={},pairs=[],seen={};
  raw.forEach(r=>{const rid=String(col(r,['rider_id','riderid','id'])||'').trim();if(!/^\d{6,}$/.test(rid)||seen[rid])return;seen[rid]=1;
    let vc=U(col(r,['vendor_code','vc','vendor'])||'');if(!vc)vc=detMap[rid]||'';if(!vc)return;
    by[vc]=(by[vc]||0)+1;pairs.push([rid,vc]);});
  const list=store.online[date]||(store.online[date]=[]);
  const old=list.findIndex(x=>x.label===label);
  const iso=new Date().toISOString();
  const sid=(old>=0&&list[old].sid)?list[old].sid:iso.replace(/[:.]/g,'');
  const snap={label,time:iso,by,pairs,count:pairs.length,sid};
  if(old>=0)list.splice(old,1);
  await saveKey(date,'snap',snap,sid);
  list.sort((a,b)=>String(b.label||'').localeCompare(String(a.label||''))||String(b.time).localeCompare(String(a.time)));
  cur.snap[date]=list.findIndex(x=>x.sid===sid);if(cur.snap[date]<0)cur.snap[date]=0;
  document.getElementById('snapTime').value='';
  alert((old>=0?T().tm_over:T().tm_new)+' '+label+': '+pairs.length+' '+T().ppl);}

async function ingest(kind,raw){const date=cur.date;
  if(kind==='detail'){
    const rows=raw.map(r=>({rider_id:String(col(r,['rider_id','riderid','id'])||'').trim(),vc:U(col(r,['vendor_code','vc','vendor'])),slot:U(col(r,['slot']))})).filter(r=>/^\d{6,}$/.test(r.rider_id)&&r.vc&&r.slot);
    await saveKey(date,'detail',rows);alert(T().a_detok(rows.length));
  }else if(kind==='target'){
    const dfilter=raw.some(r=>col(r,['date'])!=null&&String(col(r,['date'])).length);
    const rows=[],seen={};
    raw.forEach(r=>{const d=col(r,['date']);if(dfilter&&d&&!String(d).startsWith(date))return;
      const vc=U(col(r,['vendor_code','vendor code','vc'])),slot=U(col(r,['slot'])),op=num(col(r,['opzone']));
      if(!vc||!slot)return;const k=vc+'|'+slot+'|'+op;if(seen[k])return;seen[k]=1;
      rows.push({vc,city:String(col(r,['city'])||''),rm:String(col(r,['rm','rm/vm'])||''),slot,opzone:op,target:num(col(r,['target']))});});
    await saveKey(date,'target',rows);alert(T().a_tgtok(rows.length,date));
  }else if(kind==='promise'){
    const rows=[],seen={};raw.forEach(r=>{const vc=U(col(r,['vendor_code','vendor','vc']));if(!vc)return;const z=num(col(r,['zone','opzone']));const k=vc+'|'+z;if(seen[k])return;seen[k]=1;
      rows.push({vc,city:String(col(r,['city'])||''),rm:String(col(r,['rm','rm/vm'])||''),zone:z,promise:num(colLike(r,['estimaci','promise','\u627f\u8bfa']))});});
    await saveKey(date,'promise',rows);alert(T().a_promok(rows.length));
  }}

document.getElementById('resetBtn').onclick=async()=>{
  if(USER.r!=='master')return;
  if(!confirm(T().a_reset(cur.date)))return;
  if(MODE==='remote'){await sbDeleteDate(cur.date);store=await sbLoad();}
  else{delete store.online[cur.date];delete store.detail[cur.date];delete store.over[cur.date];localSave();}
  renderAll();};

/* ===== 启动 ===== */
async function boot(){applyI18n();await initStore();renderAll();
  if(MODE==='remote')setInterval(async()=>{try{const st=await sbLoad();store=st;renderAll();}catch(e){}},90000);}
applyI18n();
(function(){let e=null;try{e=localStorage.getItem(LSUSER);}catch(x){}
  const u=e?ACCOUNTS.find(a=>a.e===e):null;
  if(u){setUser(u);boot();}})();
</script>
